<style>
        /* Cyber-Technical Minimalism Grid Background */
        body {
            background-color: #051426; /* bg-background */
            background-image: 
                linear-gradient(to right, rgba(61, 73, 76, 0.15) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(61, 73, 76, 0.15) 1px, transparent 1px);
            background-size: 32px 32px;
            background-position: center top;
        }

        /* Bracket Card Style Utility */
        .bracket-border {
            position: relative;
        }
        .bracket-border::before,
        .bracket-border::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            border-color: #4cd7f6; /* text-primary */
            border-style: solid;
            pointer-events: none;
            transition: all 0.3s ease;
        }
        .bracket-border::before {
            top: -1px;
            left: -1px;
            border-width: 1px 0 0 1px;
        }
        .bracket-border::after {
            bottom: -1px;
            right: -1px;
            border-width: 0 1px 1px 0;
        }
        
        .bracket-border:hover::before,
        .bracket-border:hover::after {
            width: 12px;
            height: 12px;
            border-width: 2px 0 0 2px;
        }
        .bracket-border:hover::after {
            border-width: 0 2px 2px 0;
        }
    </style>
</head>
<body class="text-on-background min-h-screen flex flex-col font-body-md overflow-hidden relative">
<!-- TopAppBar -->
<header class="bg-surface text-primary flex justify-between items-center w-full px-margin-mobile md:px-margin-desktop h-16 z-50 fixed top-0 left-0 border-b border-outline-variant shadow-[0_0_15px_rgba(5,20,38,0.8)]">
<div class="flex items-center gap-4">
<button class="text-primary hover:text-primary-fixed hover:bg-surface-bright transition-colors rounded-full p-2 flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">grid_view</span>
</button>
<h1 class="font-headline-sm text-headline-sm font-bold tracking-tighter text-primary drop-shadow-[0_0_8px_rgba(76,215,246,0.6)] uppercase">
                PULSE_GRID
            </h1>
</div>
<div class="flex items-center gap-2">
<button class="text-primary hover:text-primary-fixed hover:bg-surface-bright transition-colors rounded-full p-2 flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
<button class="text-primary hover:text-primary-fixed hover:bg-surface-bright transition-colors rounded-full p-2 flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="help">help</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col items-center justify-center relative z-10 pt-16 pb-24 px-gutter w-full max-w-7xl mx-auto">
<!-- Prominent Logo Area -->
<div class="mb-16 text-center flex flex-col items-center">
<div class="w-16 h-16 mb-6 border border-primary flex items-center justify-center bracket-border shadow-[0_0_20px_rgba(76,215,246,0.3)] bg-surface/50 backdrop-blur-sm">
<span class="material-symbols-outlined text-4xl text-primary drop-shadow-[0_0_8px_rgba(76,215,246,0.8)]" style="font-variation-settings: 'FILL' 1;">grid_view</span>
</div>
<h2 class="font-headline-lg text-headline-lg uppercase text-on-surface drop-shadow-[0_0_15px_rgba(213,227,253,0.3)] tracking-widest">
                Pulse Grid
            </h2>
<p class="font-label-md text-label-md text-primary mt-2 uppercase opacity-80">System Ready // Awaiting Input</p>
</div>
<!-- Central Vertical Stack of Buttons -->
<div class="flex flex-col gap-5 w-full max-w-sm">
<!-- Primary Action -->
<button class="group relative w-full bg-primary-container text-on-primary-container py-4 px-6 rounded-DEFAULT font-headline-sm text-headline-sm flex items-center justify-center gap-3 transition-all duration-300 hover:brightness-110 hover:shadow-[0_0_25px_rgba(6,182,212,0.6)] focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
<span class="uppercase tracking-wide">Start Game</span>
</button>
<!-- Secondary Action -->
<button class="w-full bg-surface-container-high border border-outline-variant text-on-surface py-4 px-6 rounded-DEFAULT font-headline-sm text-headline-sm flex items-center justify-center gap-3 transition-all duration-300 hover:border-primary hover:text-primary hover:bg-surface-container-highest hover:shadow-[0_0_15px_rgba(76,215,246,0.2)] focus:outline-none bracket-border">
<span class="material-symbols-outlined">restore</span>
<span class="uppercase tracking-wide">Resume Session</span>
</button>
<!-- Tertiary Actions -->
<div class="grid grid-cols-2 gap-5 mt-2">
<button class="w-full bg-surface border border-outline-variant text-on-surface-variant py-3 px-4 rounded-DEFAULT font-label-md text-label-md flex flex-col items-center justify-center gap-2 transition-all duration-300 hover:border-tertiary hover:text-on-surface hover:bg-surface-bright focus:outline-none">
<span class="material-symbols-outlined">school</span>
<span class="uppercase">Tutorial</span>
</button>
<button class="w-full bg-surface border border-outline-variant text-on-surface-variant py-3 px-4 rounded-DEFAULT font-label-md text-label-md flex flex-col items-center justify-center gap-2 transition-all duration-300 hover:border-error hover:text-error hover:bg-surface-bright hover:shadow-[0_0_15px_rgba(255,180,171,0.2)] focus:outline-none">
<span class="material-symbols-outlined">logout</span>
<span class="uppercase">Exit</span>
</button>
</div>
</div>
<!-- Ambient Tech Details -->
<div class="absolute bottom-32 left-margin-desktop hidden md:flex flex-col gap-1 font-label-sm text-label-sm text-on-surface-variant opacity-50">
<span>SYS.VER // 2.4.01</span>
<span>NODE // ACTIVE</span>
<span>PING // 12ms</span>
</div>
<div class="absolute bottom-32 right-margin-desktop hidden md:flex flex-col items-end gap-1 font-label-sm text-label-sm text-on-surface-variant opacity-50">
<span>ENCRYPTION // STANDARD</span>
<span>USER // GUEST_774</span>
</div>

</button>
