<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PULSE_GRID - Paused</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&amp;family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&amp;family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }
        
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #051426; }
        ::-webkit-scrollbar-thumb { background: #273649; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #3d494c; }

        /* Optical Glow Utility */
        .glow-primary {
            filter: drop-shadow(0 0 8px rgba(76, 215, 246, 0.6));
        }
        .glow-surface {
            box-shadow: 0 0 40px rgba(6, 182, 212, 0.15);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary": "#d0bcff",
                        "on-secondary-fixed-variant": "#5516be",
                        "surface-dim": "#051426",
                        "on-tertiary": "#2d3133",
                        "primary": "#4cd7f6",
                        "secondary-fixed": "#e9ddff",
                        "tertiary": "#c4c7c9",
                        "primary-container": "#06b6d4",
                        "on-error-container": "#ffdad6",
                        "tertiary-fixed": "#e0e3e5",
                        "surface": "#051426",
                        "on-surface-variant": "#bcc9cd",
                        "surface-bright": "#2c3a4e",
                        "inverse-primary": "#00687a",
                        "tertiary-container": "#a4a7a9",
                        "inverse-surface": "#d5e3fd",
                        "surface-container-lowest": "#010f21",
                        "on-surface": "#d5e3fd",
                        "on-secondary-fixed": "#23005c",
                        "error-container": "#93000a",
                        "on-tertiary-fixed-variant": "#444749",
                        "surface-container-low": "#0d1c2f",
                        "outline": "#869397",
                        "tertiary-fixed-dim": "#c4c7c9",
                        "surface-container-high": "#1c2b3e",
                        "secondary-container": "#571bc1",
                        "inverse-on-surface": "#233144",
                        "on-primary-container": "#00424f",
                        "on-error": "#690005",
                        "secondary-fixed-dim": "#d0bcff",
                        "outline-variant": "#3d494c",
                        "surface-container-highest": "#273649",
                        "on-secondary-container": "#c4abff",
                        "surface-container": "#122033",
                        "primary-fixed": "#acedff",
                        "on-primary-fixed": "#001f26",
                        "on-tertiary-fixed": "#191c1e",
                        "surface-variant": "#273649",
                        "primary-fixed-dim": "#4cd7f6",
                        "on-tertiary-container": "#393d3e",
                        "background": "#051426",
                        "on-secondary": "#3c0091",
                        "on-primary": "#003640",
                        "surface-tint": "#4cd7f6",
                        "on-primary-fixed-variant": "#004e5c",
                        "on-background": "#d5e3fd",
                        "error": "#ffb4ab"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "component-padding-y": "0.75rem",
                        "component-padding-x": "1.5rem",
                        "margin-desktop": "32px",
                        "margin-mobile": "16px",
                        "grid-unit": "8px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "label-md": ["JetBrains Mono"],
                        "data-display": ["JetBrains Mono"],
                        "body-md": ["Inter"],
                        "headline-sm": ["Geist"],
                        "headline-md": ["Geist"],
                        "body-lg": ["Inter"],
                        "headline-lg": ["Geist"],
                        "label-sm": ["JetBrains Mono"]
                    },
                    "fontSize": {
                        "label-md": ["14px", { "lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "500" }],
                        "data-display": ["20px", { "lineHeight": "1.0", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "headline-sm": ["24px", { "lineHeight": "1.2", "fontWeight": "600" }],
                        "headline-md": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "headline-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-sm": ["12px", { "lineHeight": "1.2", "letterSpacing": "0.08em", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background font-body-md h-screen w-screen overflow-hidden flex flex-col relative">
<!-- LAYER 1: SIMULATED GAME BACKGROUND (Will be blurred by overlay) -->
<div class="absolute inset-0 flex flex-col z-0">
<!-- TopAppBar (Simulated Background Shell) -->
<header class="bg-surface border-b border-outline-variant flex justify-between items-center w-full px-margin-mobile md:px-margin-desktop h-16 z-10">
<div class="flex items-center gap-4 text-primary">
<span class="material-symbols-outlined text-[28px]" data-icon="grid_view">grid_view</span>
<span class="font-headline-sm text-headline-sm font-bold tracking-tighter drop-shadow-[0_0_8px_rgba(76,215,246,0.6)]">PULSE_GRID</span>
</div>
<div class="flex items-center gap-4 text-on-surface-variant">
<button class="hover:text-primary-fixed hover:bg-surface-bright transition-colors p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
<button class="hover:text-primary-fixed hover:bg-surface-bright transition-colors p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="help">help</span>
</button>
</div>
</header>
<!-- Simulated Game Playfield -->
<main class="flex-1 relative bg-surface-container-lowest overflow-hidden flex items-center justify-center">
<!-- decorative grid lines -->
<div class="absolute inset-0 opacity-20 pointer-events-none" style="background-image: linear-gradient(to right, #334155 1px, transparent 1px), linear-gradient(to bottom, #334155 1px, transparent 1px); background-size: 64px 64px; background-position: center;"></div>
<div class="absolute inset-0 opacity-10 pointer-events-none" style="background-image: linear-gradient(to right, #4cd7f6 1px, transparent 1px), linear-gradient(to bottom, #4cd7f6 1px, transparent 1px); background-size: 320px 320px; background-position: center;"></div>
<!-- Dummy active nodes -->
<div class="absolute top-[30%] left-[40%] w-4 h-4 bg-primary rounded-full glow-primary"></div>
<div class="absolute top-[60%] left-[55%] w-4 h-4 bg-secondary rounded-full shadow-[0_0_12px_rgba(208,188,255,0.6)]"></div>
<svg class="absolute inset-0 w-full h-full pointer-events-none" preserveaspectratio="none">
<line class="opacity-50 drop-shadow-[0_0_4px_rgba(76,215,246,0.8)]" stroke="#4cd7f6" stroke-width="2" x1="40%" x2="55%" y1="30%" y2="60%"></line>
</svg>
</main>
<!-- BottomNavBar (Simulated Background Shell - Mobile Only visibility) -->
<nav class="md:hidden border-t border-outline-variant bg-surface-container/80 backdrop-blur-md fixed bottom-0 left-0 w-full z-10 flex justify-around items-center px-gutter py-2">
<!-- GAME (Active) -->
<button class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-6 py-1 shadow-[0_0_15px_rgba(6,182,212,0.4)] scale-90 brightness-125 transition-all">
<span class="material-symbols-outlined fill mb-1" data-icon="videogame_asset">videogame_asset</span>
<span class="font-label-sm text-label-sm">GAME</span>
</button>
<!-- LEVELS -->
<button class="flex flex-col items-center justify-center text-on-surface-variant opacity-70 hover:opacity-100 hover:text-primary px-4 py-1 transition-all">
<span class="material-symbols-outlined mb-1" data-icon="format_list_numbered">format_list_numbered</span>
<span class="font-label-sm text-label-sm">LEVELS</span>
</button>
<!-- STATUS -->
<button class="flex flex-col items-center justify-center text-on-surface-variant opacity-70 hover:opacity-100 hover:text-primary px-4 py-1 transition-all">
<span class="material-symbols-outlined mb-1" data-icon="analytics">analytics</span>
<span class="font-label-sm text-label-sm">STATUS</span>
</button>
<!-- MENU -->
<button class="flex flex-col items-center justify-center text-on-surface-variant opacity-70 hover:opacity-100 hover:text-primary px-4 py-1 transition-all">
<span class="material-symbols-outlined mb-1" data-icon="menu">menu</span>
<span class="font-label-sm text-label-sm">MENU</span>
</button>
</nav>
</div>
<!-- LAYER 2 & 3: PAUSE OVERLAY & MODAL -->
<!-- Glassmorphism overlay -->
<div class="absolute inset-0 z-50 backdrop-blur-[12px] bg-surface/80 flex items-center justify-center p-6">
<!-- Modal Container (Bracket Style) -->
<div class="relative w-full max-w-[400px] bg-surface-container-high border border-outline-variant p-8 md:p-10 shadow-[0_0_40px_rgba(6,182,212,0.1)] flex flex-col items-center">
<!-- Bracket Accents -->
<div class="absolute top-0 left-0 w-4 h-4 border-t-2 border-l-2 border-primary -translate-x-[1px] -translate-y-[1px]"></div>
<div class="absolute bottom-0 right-0 w-4 h-4 border-b-2 border-r-2 border-primary translate-x-[1px] translate-y-[1px]"></div>
<!-- Header -->
<div class="mb-10 w-full relative flex justify-center items-center">
<h1 class="font-headline-lg text-headline-lg font-bold text-primary tracking-tighter drop-shadow-[0_0_12px_rgba(76,215,246,0.5)]">
                    PAUSED
                </h1>
<!-- decorative lines beside header -->
<div class="absolute left-0 top-1/2 -translate-y-1/2 w-8 h-[1px] bg-outline-variant"></div>
<div class="absolute right-0 top-1/2 -translate-y-1/2 w-8 h-[1px] bg-outline-variant"></div>
</div>
<!-- Options Menu -->
<div class="w-full flex flex-col gap-4">
<!-- Primary Action: Resume -->
<button class="w-full group relative overflow-hidden bg-primary-container text-on-primary-container border border-primary-container hover:border-primary-fixed py-4 flex items-center justify-center transition-all duration-200 hover:brightness-125 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-surface-container-high">
<div class="absolute inset-0 bg-white/20 -translate-x-full group-hover:animate-[shimmer_1.5s_infinite] pointer-events-none"></div>
<span class="font-label-md text-label-md tracking-wider">RESUME</span>
</button>
<!-- Secondary Actions: Ghost Buttons -->
<button class="w-full bg-transparent text-primary border border-outline-variant hover:border-primary/50 hover:bg-surface-bright/50 py-3 flex items-center justify-center transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-surface-container-high">
<span class="font-label-md text-label-md tracking-wider">RESTART LEVEL</span>
</button>
<button class="w-full bg-transparent text-primary border border-outline-variant hover:border-primary/50 hover:bg-surface-bright/50 py-3 flex items-center justify-center transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-surface-container-high">
<span class="font-label-md text-label-md tracking-wider">OPTIONS</span>
</button>
<div class="w-full h-[1px] bg-outline-variant/50 my-2"></div>
<button class="w-full bg-transparent text-on-surface-variant border border-outline-variant hover:border-error/50 hover:text-error hover:bg-error-container/20 py-3 flex items-center justify-center transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-error focus:ring-offset-2 focus:ring-offset-surface-container-high">
<span class="font-label-md text-label-md tracking-wider">QUIT TO MENU</span>
</button>
</div>
</div>
</div>
<!-- Tailwind Config for Shimmer Animation -->
<style>
        @keyframes shimmer {
            100% {
                transform: translateX(100%);
            }
        }
    </style>
</body></html>
